name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 14 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health
        env:
          URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          curl -fsSL "$URL/auth/v1/health" > /dev/null
          echo "pinged $URL"
