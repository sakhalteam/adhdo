name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 14 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health
        env:
          URL: ${{ secrets.VITE_SUPABASE_URL }}
          KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          curl -fsSL \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            "$URL/auth/v1/health"
          echo
          echo "pinged $URL"
