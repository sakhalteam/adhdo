name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 14 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          URL: ${{ secrets.VITE_SUPABASE_URL }}
          KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "URL length: ${#URL}  KEY length: ${#KEY}"
          paths=("/auth/v1/health" "/rest/v1/" "/rest/v1/galaxy_states?select=id&limit=1")
          for path in "${paths[@]}"; do
            code=$(curl -s -o /tmp/body -w "%{http_code}" \
              -H "apikey: $KEY" \
              -H "Authorization: Bearer $KEY" \
              "$URL$path")
            echo "[$code] $path"
            head -c 200 /tmp/body; echo
          done
